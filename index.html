<script>
        const CSV_FILE = 'glossary.csv?v=' + new Date().getTime(); 
        let allData = [];
        let currentSessionCards = [];
        let currentIndex = 0;
        let yesCount = 0;
        let activeNoteDay = null;
        const intervals = [1, 2, 4, 7, 14, 28, 90];

        function getSGTodaysDate() {
            const now = new Date();
            // Force conversion to Singapore Time string then back to Date object
            const sgString = now.toLocaleString("en-US", {timeZone: "Asia/Singapore"});
            const sgTime = new Date(sgString);
            sgTime.setHours(0,0,0,0);
            return sgTime;
        }

        // IMPROVED: Handles YYYY-MM-DD, MM/DD/YYYY, and YYYY/MM/DD
        function parseToSGDate(dateStr) {
            if (!dateStr) return null;
            const normalized = dateStr.trim().replace(/\//g, '-');
            const parts = normalized.split('-');
            
            let year, month, day;
            
            if (parts[0].length === 4) { // YYYY-MM-DD
                year = parseInt(parts[0]);
                month = parseInt(parts[1]) - 1;
                day = parseInt(parts[2]);
            } else { // MM-DD-YYYY
                month = parseInt(parts[0]) - 1;
                day = parseInt(parts[1]);
                year = parseInt(parts[2]);
            }
            
            const d = new Date(year, month, day, 0, 0, 0, 0);
            return isNaN(d.getTime()) ? null : d;
        }

        Papa.parse(CSV_FILE, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.slice(1)
                    .filter(row => row[0] && row[1] && row[2]) 
                    .map(row => ({ date: row[0].trim(), chinese: row[1].trim(), english: row[2].trim() }));
                
                const uniqueDates = [...new Set(allData.map(item => item.date))].sort((a, b) => b.localeCompare(a));
                const selector = document.getElementById('date-selector');
                const today = getSGTodaysDate();
                let dueDates = [];

                uniqueDates.forEach(dStr => {
                    const noteDate = parseToSGDate(dStr);
                    if (!noteDate) return;

                    const diff = Math.round((today - noteDate) / (1000 * 60 * 60 * 24));
                    const isDue = intervals.includes(diff);
                    
                    let option = document.createElement('option');
                    option.value = dStr;
                    option.text = isDue ? `📍 ${dStr} (Due Today)` : dStr;
                    selector.appendChild(option);
                    if (isDue) dueDates.push(dStr);
                });

                if (dueDates.length > 0) {
                    document.getElementById('notification-box').style.display = 'block';
                    document.getElementById('notification-msg').innerHTML = `As scheduled, please take a test on note day of:<br><strong>${dueDates.join(', ')}</strong>`;
                }
            }
        });

        function startSession() {
            activeNoteDay = document.getElementById('date-selector').value;
            if (!activeNoteDay) return;
            yesCount = 0; currentIndex = 0;
            document.getElementById('notification-box').style.display = 'none';
            document.getElementById('selector-container').style.display = 'none';
            document.getElementById('card-container').style.display = 'block';
            currentSessionCards = allData.filter(item => item.date === activeNoteDay).sort(() => Math.random() - 0.5);
            showCard();
        }

        function showCard() {
            const data = currentSessionCards[currentIndex];
            document.getElementById('header').innerText = `Card ${currentIndex + 1}/${currentSessionCards.length}`;
            document.getElementById('front-text').innerText = data.chinese;
            document.getElementById('back-text').innerText = data.english;
            document.getElementById('card').classList.remove('flipped');
            document.getElementById('controls').style.display = 'none';
        }

        function flipCard() { 
            document.getElementById('card').classList.add('flipped'); 
            document.getElementById('controls').style.display = 'flex'; 
        }

        function recordAnswer(isYes) {
            if (isYes) yesCount++;
            currentIndex++;
            if (currentIndex < currentSessionCards.length) showCard(); else showReminder();
        }

        function showReminder() {
            document.getElementById('card-container').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('header').innerText = "Test Complete";
            
            const start = parseToSGDate(activeNoteDay);
            const today = getSGTodaysDate();
            const diff = Math.round((today - start) / (1000 * 60 * 60 * 24));
            const acc = Math.round((yesCount / currentSessionCards.length) * 100);

            let tableHTML = `<table><tr><th># test</th><th>days lag</th><th>test day</th><th>if tested</th><th>accuracy</th></tr>`;
            intervals.forEach((days, i) => {
                const tDate = new Date(start);
                tDate.setDate(start.getDate() + days);
                
                const isCurrent = (diff === days);
                const isPast = (diff > days);
                
                // Format date for display in the table
                const dateDisplay = `${tDate.getMonth()+1}/${tDate.getDate()}/${tDate.getFullYear()}`;

                tableHTML += `<tr ${isCurrent ? 'class="highlight-row"' : ''}>
                    <td>${i+1}</td><td>${days} days</td><td>${dateDisplay}</td>
                    <td>${isCurrent ? "Tested" : (isPast ? "Complete" : "Pending")}</td>
                    <td>${isCurrent ? '<strong>'+acc+'%</strong>' : ""}</td></tr>`;
            });
            tableHTML += `</table>`;

            const reminderDiv = document.getElementById('reminder');
            reminderDiv.style.display = 'block';
            reminderDiv.innerHTML = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">Ebbinghaus Tracker</div>${tableHTML}<button onclick="location.reload()" style="background:#444; color:white; padding:15px; border-radius:10px; border:none; width:100%; margin-top:20px;">Menu</button>`;
        }
    </script>
