<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LingoCurve_individual1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #4CAF50; --secondary: #f44336; --bg: #f9f9f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #header { margin-bottom: 10px; font-weight: bold; color: #555; text-align: center; }
        
        /* New Selector Styles */
        #selector-container { margin-bottom: 20px; text-align: center; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; background: white; width: 200px; }

        #card-container { width: 100%; max-width: 400px; height: 250px; perspective: 1000px; cursor: pointer; display: none; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; border: 1px solid #ddd; border-radius: 12px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px; padding: 20px; box-sizing: border-box; text-align: center; }
        .card-back { transform: rotateY(180deg); background-color: #fffdf5; }
        
        #controls { margin-top: 30px; display: none; gap: 20px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .yes-btn { background-color: var(--primary); }
        .no-btn { background-color: var(--secondary); }
        #reminder { display: none; text-align: center; font-size: 20px; margin-top: 50px; line-height: 1.5; color: #333; }
    </style>
</head>
<body>

    <div id="header">Loading Vocabulary...</div>

    <div id="selector-container">
        <select id="date-selector" onchange="startSession()">
            <option value="">-- Select a Note Day --</option>
        </select>
    </div>

    <div id="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front" id="front-text"></div>
            <div class="card-face card-back" id="back-text"></div>
        </div>
    </div>

    <div id="controls">
        <button class="yes-btn" onclick="nextCard()">Yes</button>
        <button class="no-btn" onclick="nextCard()">No</button>
    </div>

    <div id="reminder"></div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRRlw2q97jLEUwmjCO_HsvPbDyeJIH4o7_qomsEz1GCLLVmZCm1sYP8XSGlDXjTHWCjXeU_2DaSXWAs/pub?gid=949570896&single=true&output=csv';
        let allData = [];
        let currentSessionCards = [];
        let currentIndex = 0;

        // Fetch CSV data [cite: 8, 9]
        Papa.parse(CSV_URL, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                // Remove header, filter out rows with blank Chinese or English cells [cite: 18]
                allData = results.data.slice(1).filter(row => row[0] && row[1] && row[2]);
                
                // Get unique note_days for the dropdown 
                const uniqueDates = [...new Set(allData.map(row => row[0].trim()))].sort();
                const selector = document.getElementById('date-selector');
                
                uniqueDates.forEach(date => {
                    let option = document.createElement('option');
                    option.value = date;
                    option.text = date;
                    selector.appendChild(option);
                });

                document.getElementById('header').innerText = "Select a session to begin";
            }
        });

        function startSession() {
            const selectedDate = document.getElementById('date-selector').value;
            if (!selectedDate) return;

            // Filter by selected note_day and randomize order [cite: 12, 19]
            currentSessionCards = allData
                .filter(row => row[0].trim() === selectedDate)
                .sort(() => Math.random() - 0.5);

            currentIndex = 0;
            document.getElementById('selector-container').style.display = 'none';
            document.getElementById('card-container').style.display = 'block';
            document.getElementById('reminder').style.display = 'none';
            showCard();
        }

        function showCard() {
            const currentData = currentSessionCards[currentIndex];
            document.getElementById('header').style.display = 'block';
            document.getElementById('header').innerText = `Reviewing: ${currentData[0]} (${currentIndex + 1}/${currentSessionCards.length})`;
            document.getElementById('front-text').innerText = currentData[1]; // Column B (Chinese) [cite: 10, 13]
            document.getElementById('back-text').innerText = currentData[2];  // Column C (English) [cite: 10, 14]
            document.getElementById('card').classList.remove('flipped');
            document.getElementById('controls').style.display = 'none';
        }

        function flipCard() {
            document.getElementById('card').classList.add('flipped');
            document.getElementById('controls').style.display = 'flex'; // Show Yes/No buttons [cite: 15]
        }

        function nextCard() {
            currentIndex++;
            if (currentIndex < currentSessionCards.length) {
                showCard();
            } else {
                showReminder();
            }
        }

        function showReminder() {
            document.getElementById('card-container').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('header').style.display = 'none';
            
            // Show Ebbinghaus reminder 
            const reminderDiv = document.getElementById('reminder');
            reminderDiv.style.display = 'block';
            reminderDiv.innerHTML = `
                <strong>Session Complete!</strong><br><br>
                Great job! Based on the Ebbinghaus curve,<br>
                your next review for this set is in <strong>2 days</strong>.<br><br>
                <button onclick="location.reload()" style="background:#444; width:auto; padding:10px 20px;">Review Another Set</button>
            `;
        }
    </script>
</body>
</html>
