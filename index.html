<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LingoCurve_individual1</title>
    <style>
        :root { --primary: #4CAF50; --secondary: #f44336; --bg: #f9f9f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #header { margin-bottom: 20px; font-weight: bold; color: #555; text-align: center; }
        #card-container { width: 100%; max-width: 400px; height: 250px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; border: 1px solid #ddd; border-radius: 12px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px; padding: 20px; box-sizing: border-box; text-align: center; }
        .card-back { transform: rotateY(180deg); background-color: #fffdf5; }
        #controls { margin-top: 30px; display: none; gap: 20px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .yes-btn { background-color: var(--primary); }
        .no-btn { background-color: var(--secondary); }
        #reminder { display: none; text-align: center; font-size: 20px; margin-top: 50px; line-height: 1.5; color: #333; }
    </style>
</head>
<body>

    <div id="header">Fetching Latest Data...</div>

    <div id="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front" id="front-text"></div>
            <div class="card-face card-back" id="back-text"></div>
        </div>
    </div>

    <div id="controls">
        <button class="yes-btn" onclick="nextCard()">Yes</button>
        <button class="no-btn" onclick="nextCard()">No</button>
    </div>

    <div id="reminder"></div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRRlw2q97jLEUwmjCO_HsvPbDyeJIH4o7_qomsEz1GCLLVmZCm1sYP8XSGlDXjTHWCjXeU_2DaSXWAs/pub?gid=949570896&single=true&output=csv';
        let cards = [];
        let currentIndex = 0;

        // Fetch CSV using native JavaScript
        fetch(CSV_URL)
            .then(response => response.text())
            .then(text => {
                const rows = text.split('\n').map(row => row.split(','));
                const data = rows.slice(1).filter(row => row.length >= 3 && row[1] && row[2]); // Filter valid rows
                
                // Get the most recent note_day from the sheet
                const uniqueDates = [...new Set(data.map(row => row[0].trim()))].filter(d => d);
                const latestDate = uniqueDates[uniqueDates.length - 1];

                // Filter for today's cards and randomize
                cards = data.filter(row => row[0].trim() === latestDate)
                            .sort(() => Math.random() - 0.5);

                if (cards.length > 0) {
                    showCard();
                } else {
                    document.getElementById('header').innerText = "No data found for: " + latestDate;
                }
            })
            .catch(err => {
                document.getElementById('header').innerText = "Sync Error: Please ensure your Sheet is 'Published to the Web' as a CSV.";
                console.error(err);
            });

        function showCard() {
            const currentData = cards[currentIndex];
            document.getElementById('header').innerText = `${currentData[0]} - Card ${currentIndex + 1}/${cards.length}`;
            document.getElementById('front-text').innerText = currentData[1]; // Chinese
            document.getElementById('back-text').innerText = currentData[2];  // English
            document.getElementById('card').classList.remove('flipped');
            document.getElementById('controls').style.display = 'none';
        }

        function flipCard() {
            document.getElementById('card').classList.add('flipped');
            document.getElementById('controls').style.display = 'flex';
        }

        function nextCard() {
            currentIndex++;
            if (currentIndex < cards.length) {
                showCard();
            } else {
                showReminder();
            }
        }

        function showReminder() {
            document.getElementById('card-container').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('header').style.display = 'none';
            
            // Basic Ebbinghaus reminder (Next review in 2 days)
            const reminderDiv = document.getElementById('reminder');
            reminderDiv.style.display = 'block';
            reminderDiv.innerHTML = `<strong>Session Complete!</strong><br><br>Based on the Ebbinghaus curve,<br>your next review for this set is in 2 days.`;
        }
    </script>
</body>
</html>
