<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LingoCurve_individual1</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LingoCurve">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --primary: #4CAF50; --secondary: #f44336; --bg: #f9f9f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        #status-bar { font-size: 11px; color: #999; margin-bottom: 10px; text-align: center; }
        #header { margin-bottom: 15px; font-weight: bold; color: #555; text-align: center; }
        #selector-container { margin-bottom: 20px; text-align: center; width: 100%; }
        select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; background: white; width: 85%; max-width: 300px; -webkit-appearance: none; }
        #card-container { width: 100%; max-width: 400px; height: 250px; perspective: 1000px; display: none; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.4s; transform-style: preserve-3d; border: 1px solid #ddd; border-radius: 12px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px; padding: 20px; box-sizing: border-box; text-align: center; }
        .card-back { transform: rotateY(180deg); background-color: #fffdf5; }
        #controls { margin-top: 30px; display: none; gap: 20px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .yes-btn { background-color: var(--primary); }
        .no-btn { background-color: var(--secondary); }
        #reminder { display: none; text-align: center; font-size: 14px; margin-top: 20px; width: 100%; max-width: 500px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; font-size: 12px; }
        .highlight-row { background-color: #e8f5e9; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-bar">Looking for glossary.csv...</div>
    <div id="header">LingoCurve</div>

    <div id="selector-container">
        <select id="date-selector" onchange="startSession()">
            <option value="">-- Choose a Note Day --</option>
        </select>
    </div>

    <div id="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front" id="front-text"></div>
            <div class="card-face card-back" id="back-text"></div>
        </div>
    </div>

    <div id="controls">
        <button class="yes-btn" onclick="recordAnswer(true)">Yes</button>
        <button class="no-btn" onclick="recordAnswer(false)">No</button>
    </div>

    <div id="reminder"></div>

    <script>
        const CSV_FILE = 'glossary.csv'; 
        let allData = [];
        let currentSessionCards = [];
        let currentIndex = 0;
        let activeNoteDay = null;
        let yesCount = 0;
        const intervals = [1, 2, 4, 7, 14, 28, 90];

        function formatDate(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr.trim());
            return isNaN(date) ? dateStr.trim() : `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        Papa.parse(CSV_FILE, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const now = new Date();
                document.getElementById('status-bar').innerText = `Sync: ${now.toLocaleTimeString()}`;

                allData = results.data.slice(1)
                    .filter(row => row[0] && row[1] && row[2]) 
                    .map(row => ({
                        date: formatDate(row[0]),
                        chinese: row[1].trim(),
                        english: row[2].trim()
                    }));
                
                if (allData.length === 0) {
                    document.getElementById('status-bar').innerText = "File found, but no data found inside.";
                    return;
                }

                const uniqueDates = [...new Set(allData.map(item => item.date))].sort((a, b) => b.localeCompare(a));
                const selector = document.getElementById('date-selector');
                uniqueDates.forEach(date => {
                    let option = document.createElement('option');
                    option.value = date;
                    option.text = date;
                    selector.appendChild(option);
                });
                document.getElementById('header').innerText = "Select a Session";
            },
            error: function() {
                document.getElementById('status-bar').innerText = "ERROR: Cannot find 'glossary.csv'. Check your GitHub files.";
                document.getElementById('header').innerText = "Connection Failed";
            }
        });

        function startSession() {
            activeNoteDay = document.getElementById('date-selector').value;
            if (!activeNoteDay) return;
            currentSessionCards = allData.filter(item => item.date === activeNoteDay).sort(() => Math.random() - 0.5);
            currentIndex = 0; yesCount = 0;
            document.getElementById('selector-container').style.display = 'none';
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('card-container').style.display = 'block';
            showCard();
        }

        function showCard() {
            const currentData = currentSessionCards[currentIndex];
            document.getElementById('header').innerText = `Card ${currentIndex + 1}/${currentSessionCards.length}`;
            document.getElementById('front-text').innerText = currentData.chinese;
            document.getElementById('back-text').innerText = currentData.english;
            document.getElementById('card').classList.remove('flipped');
            document.getElementById('controls').style.display = 'none';
        }

        function flipCard() {
            document.getElementById('card').classList.add('flipped');
            document.getElementById('controls').style.display = 'flex';
        }

        function recordAnswer(isYes) {
            if (isYes) yesCount++;
            currentIndex++;
            if (currentIndex < currentSessionCards.length) showCard(); else showReminder();
        }

        function showReminder() {
            document.getElementById('card-container').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('header').style.display = 'none';
            
            const start = new Date(activeNoteDay);
            const today = new Date();
            const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            const accuracy = ((yesCount / currentSessionCards.length) * 100).toFixed(0);

            let tableHTML = `<table><tr><th>#</th><th>Lag</th><th>Date</th><th>Done?</th><th>Acc.</th></tr>`;
            intervals.forEach((days, index) => {
                let testDate = new Date(start);
                testDate.setDate(start.getDate() + days);
                const isCurrent = (diffDays >= days && (index === intervals.length - 1 || diffDays < intervals[index+1]));
                tableHTML += `<tr ${isCurrent ? 'class="highlight-row"' : ''}>
                    <td>${index + 1}</td><td>${days}d</td><td>${testDate.toLocaleDateString()}</td>
                    <td>${isCurrent ? "Yes" : (diffDays > days ? "✓" : "")}</td>
                    <td>${isCurrent ? accuracy + "%" : ""}</td></tr>`;
            });
            tableHTML += `</table>`;

            const reminderDiv = document.getElementById('reminder');
            reminderDiv.style.display = 'block';
            reminderDiv.innerHTML = `<strong>Summary</strong><br>${tableHTML}<br><button onclick="location.reload()" style="background:#444; color:white; padding:10px; border-radius:8px; border:none; margin-top:10px;">Menu</button>`;
        }
    </script>
</body>
</html>
