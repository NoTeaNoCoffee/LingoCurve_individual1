<script>
    // Force cache-busting for the CSV
    const CSV_FILE = 'glossary.csv?v=' + new Date().getTime(); 
    let allData = [];
    let currentSessionCards = [];
    let currentIndex = 0;
    let yesCount = 0; 
    let activeNoteDay = null;
    const intervals = [1, 2, 4, 7, 14, 28, 90];

    // NEW: Function to get "Today" specifically in Singapore Time
    function getSingaporeToday() {
        const now = new Date();
        // Convert current time to a string in Singapore time, then parse it back
        const sgString = now.toLocaleString("en-US", {timeZone: "Asia/Singapore"});
        const today = new Date(sgString);
        today.setHours(0, 0, 0, 0); // Reset to midnight
        return today;
    }

    // NEW: Robust Date Parser that ignores UTC shifts
    function parseToLocalMidnight(dateStr) {
        if (!dateStr) return null;
        // Split YYYY-MM-DD to avoid the browser assuming UTC
        const parts = dateStr.split('-');
        if (parts.length !== 3) return new Date(dateStr); 
        // Create date using local year, month (0-indexed), and day
        return new Date(parts[0], parts[1] - 1, parts[2], 0, 0, 0, 0);
    }

    function formatDate(dateStr) {
        const d = parseToLocalMidnight(dateStr);
        if (!d || isNaN(d)) return dateStr;
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    Papa.parse(CSV_FILE, {
        download: true,
        header: false,
        skipEmptyLines: true,
        complete: function(results) {
            allData = results.data.slice(1)
                .filter(row => row[0] && row[1] && row[2]) 
                .map(row => ({ 
                    date: formatDate(row[0]), 
                    chinese: row[1].trim(), 
                    english: row[2].trim() 
                }));
            
            const uniqueDates = [...new Set(allData.map(item => item.date))].sort((a, b) => b.localeCompare(a));
            const selector = document.getElementById('date-selector');
            
            let dueDates = [];
            const today = getSingaporeToday(); // SGT Midnight

            uniqueDates.forEach(date => {
                const start = parseToLocalMidnight(date); // Note day Midnight
                const diff = Math.round((today - start) / (1000 * 60 * 60 * 24));
                
                const isDue = intervals.includes(diff);
                
                let option = document.createElement('option');
                option.value = date;
                option.text = isDue ? `📍 ${date} (Due Today)` : date;
                selector.appendChild(option);
                
                if (isDue) dueDates.push(date);
            });

            if (dueDates.length > 0) {
                document.getElementById('notification-box').style.display = 'block';
                document.getElementById('notification-msg').innerHTML = 
                    `As scheduled, please take a test on note day of:<br><strong>${dueDates.join(', ')}</strong>`;
            }
        }
    });

    // ... recordAnswer and showCard remain the same ...

    function showReminder() {
        document.getElementById('card-container').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('header').innerText = "Test Results";
        
        const start = parseToLocalMidnight(activeNoteDay);
        const today = getSingaporeToday();
        const diff = Math.round((today - start) / (1000 * 60 * 60 * 24));
        const calcAccuracy = Math.round((yesCount / currentSessionCards.length) * 100);

        let tableHTML = `<table>
            <tr><th># test</th><th>days lag</th><th>test day</th><th>if tested</th><th>accuracy</th></tr>`;

        intervals.forEach((days, i) => {
            const testDate = new Date(start);
            testDate.setDate(start.getDate() + days);
            
            const isCurrent = (diff === days); // Exact match for the interval
            const isPast = (diff > days);
            
            let rowClass = isCurrent ? 'class="highlight-row"' : '';
            let status = isCurrent ? "Tested" : (isPast ? "Complete" : "Pending");
            let accDisplay = isCurrent ? `<strong>${calcAccuracy}%</strong>` : "";

            tableHTML += `<tr ${rowClass}>
                <td>${i + 1}</td>
                <td>${days} days</td>
                <td>${testDate.getMonth()+1}/${testDate.getDate()}/${testDate.getFullYear()}</td>
                <td>${status}</td>
                <td>${accDisplay}</td>
            </tr>`;
        });
        tableHTML += `</table>`;

        const reminderDiv = document.getElementById('reminder');
        reminderDiv.style.display = 'block';
        reminderDiv.innerHTML = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">Ebbinghaus Tracker</div>${tableHTML}<button onclick="location.reload()" style="background:#444; color:white; padding:15px; border-radius:10px; border:none; width:100%; margin-top:20px; font-size:16px;">Return to Menu</button>`;
    }
</script>
